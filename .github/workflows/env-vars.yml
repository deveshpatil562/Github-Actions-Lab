name: ENV Varaibles 

on:
  workflow_dispatch:

env: 
  APP_NAME: myapp

jobs:
  var:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: staging 
    steps:
      - name: Print env vars
        env: 
          VERSION: 1.0.0   #step level env variable
        run: | 
          echo "App: $APP_NAME"
          echo "Environment: $ENVIRONMENT"
          echo "version: $VERSION"
          echo "Commit SHA: ${{ github.sha}}"
          echo "Actor: ${{ github.actor }}"