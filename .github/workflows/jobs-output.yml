name: Jobs Outputs

on:
  workflow_dispatch

jobs:
  set-date:
    runs-on: ubuntu-latest
    outputs:
      today: ${{ steps.date.outputs.today }}
    steps:
      - name: date
        run: echo "date=$(date)" >> $GITHUB_OUTPUT
        
  use-date:
    runs-on: ubuntu-latest
    needs: set-date
    steps:
      - name: Print Date
        run: echo "Todays date is ${{ needs.set-date.outputs.date}}"