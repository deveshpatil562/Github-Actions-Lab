name: Test Composite Action

on:
  push:
    branches:
      - main

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use custom greet action
        uses: ./.github/actions/setup-and-greet
        with:
          name: "Devesh"
          language: "en"
