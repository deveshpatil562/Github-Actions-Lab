name: Run Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Unit test simulation
        run: echo "Unit tests passed"

      - name: Check for TODOs in code (excluding .git)
        run: |
          if grep -R "TODO" . --exclude-dir=.git; then
            echo "Found TODOs in code"
            exit 1
          else
            echo "No TODOs found"
          fi

      - name: Ensure README exists
        run: |
          if [ ! -f "README.md" ]; then
            echo "README.md is missing"
            exit 1
          fi
          echo "README.md exists"
