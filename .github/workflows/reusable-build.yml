name: Reusable Build Workflow

on:
  workflow_call:
    inputs:
      app_name:
        description: "Devops Application"
        required: true
        type: string
      environment:
        description: "Deployment Environment"
        required: true
        type: string
        default: staging
    secrets:
      DOCKER_TOKEN:
        description: "Docker authentication token"
        required: true
    outputs:
      build_version:
        description: "Generated build version"
        value: ${{ jobs.build.outputs.build_version }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print Build info
        run: echo "Building ${{ inputs.app_name }} for ${{ inputs.environment }}"

      - name: Verify Docker token
        run: |
          echo "Docker token is set: ${{ secrets.DOCKER_TOKEN != '' }}"

      - name: Generate version
        id: version
        run: echo "build_version=v1.0-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT