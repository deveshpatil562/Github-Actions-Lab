name: "Setup and Greet"
description: "Custom composite action to greet"

inputs:
  name:
    description: "Name to greet"
    required: true
  language:
    description: "Language for greeting"
    required: false
    default: en

outputs:
  greeted:
    description: "Whether greeting was printed"
    value: true

runs:
  using: "composite"
  steps:
    - name: Print greeting
      run: |
        if [ "${{ inputs.language }}" = "en" ]; then
          echo "Hello, ${{ inputs.name }}!"
        elif [ "${{ inputs.language }}" = "es" ]; then
          echo "¡Hola, ${{ inputs.name }}!"
        else
          echo "Hi, ${{ inputs.name }}!"
        fi

    - name: Print date and OS
      run:
        echo "Date: $(date), OS: $RUNNER_OS"
