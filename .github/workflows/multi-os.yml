name: Multi-OS Workflow

on: [workflow_dispatch]

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print Docker version
        run: docker --version

      - name: Print python version
        run: python3 --version

      - name: Print Node.js version
        run: node --version

      - name: Print Git version
        run: git --version

  
