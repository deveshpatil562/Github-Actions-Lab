name: Multi-OS Workflow

on: [push, workflow_dispatch]

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print system info
        run: |
          'echo "OS: $(uname -s)"'
          'echo "Hostname: $(hostname)"'
          'echo "User: $(whoami)"'

  windows-job:
    runs-on: windows-latest
    steps:
        - name: Print system info
          run: |
            'echo "OS: Windows"'
            hostname
            whoami

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Print system info
        run: |
          'echo "OS: $(uname -s)"'
          'echo "Hostname: $(hostname)"'
          'echo "User: $(whoami)"'
