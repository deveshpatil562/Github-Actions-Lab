name: Multi Task Workflow

on:
    workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: building stage
        run: echo  "Building the app"
        
  
  test:
     runs-on: ubuntu-latest
     needs: build
     steps:
        - name: Testing Stage
          run: echo "Running tests"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deplyment stage
        run: echo "Deploying"